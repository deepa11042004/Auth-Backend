name: Deploy Backend to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 4️⃣ REMOVE OLD IMAGE (LOCAL RUNNER)
      - name: Remove old Docker image
        run: |
          docker rmi ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest || true

      # 🔥 5️⃣ Build & Push (NO CACHE)
      - name: Build & Push Docker image
        run: |
          docker buildx build \
          --no-cache \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest \
          --push .

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 🔥 remove old container
            docker stop backend-app || true
            docker rm backend-app || true

            # 🔥 remove old image from EC2
            docker rmi ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest || true

            # 🔄 pull fresh image
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest

            # free port
            sudo fuser -k 5000/tcp || true

            # 🚀 run fresh container
            docker run -d -p 5000:5000 \
            --name backend-app \
            ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest
