name: Deploy Backend to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 4️⃣ REMOVE OLD IMAGE (LOCAL RUNNER)
      - name: Remove old Docker image
        run: |
          docker rmi ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest || true

      # 🔥 5️⃣ Build & Push (NO CACHE)
      - name: Build & Push Docker image
        run: |
          docker buildx build \
          --no-cache \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest \
          --push .

      # 6️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 🔥 remove old container
            docker stop backend-app || true
            docker rm backend-app || true

            # 🔥 remove old image from EC2
            docker rmi ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest || true

            # 🔄 pull fresh image
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest

            # free port
            sudo fuser -k 5000/tcp || true

            # 🚀 run fresh container
            docker run -d -p 5000:5000 \
            --name backend-app \
            -e PORT=5000 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            -e RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }} \
            -e RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REGION=${{ secrets.AWS_REGION }} \
            -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
            ${{ secrets.DOCKER_USERNAME }}/backend-bserc:latest